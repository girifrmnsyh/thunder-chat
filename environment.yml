# ============================================================
# ThunderChat — environment.yml
# Conda environment untuk development lokal.
# Versi tidak dikunci ketat (sesuai NFR Section 8 PRD).
# ============================================================

name: thunderchat

channels:
  - defaults
  - conda-forge

dependencies:
  # --- Python runtime ---
  - python>=3.10

  # --- Data Processing (conda-forge lebih stabil untuk scientific stack) ---
  - pandas>=2.0
  - numpy>=1.26
  - scikit-learn>=1.4

  # --- Pip-only packages (tidak tersedia di conda channel) ---
  - pip
  - pip:
      # Framework
      - streamlit>=1.35

      # Gemini API — SDK resmi terbaru (bukan google-generativeai yang deprecated)
      - google-genai>=1.0

      # UI Components
      - streamlit-shadcn-ui>=0.3

      # Loading Animation
      - streamlit-lottie>=0.0.5
      - requests>=2.31

      # Utilities
      - python-dotenv>=1.0
